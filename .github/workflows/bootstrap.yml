name: bootstrap

# Manages OIDC Provider and IAM roles for all repositories per AWS account.
# Run "plan" to preview changes, then "apply" to execute.
#
# Prerequisites (one-time manual setup per account):
#   1. Create S3 bucket for bootstrap state (see README Step 1)
#   2. Create bootstrap IAM user with AdministratorAccess
#   3. Register credentials in GitHub Environment bootstrap-<env>:
#      AWS_BOOTSTRAP_ACCESS_KEY_ID / AWS_BOOTSTRAP_SECRET_ACCESS_KEY
#
# After apply:
#   Register output ARNs in terraform-repo / terraform-accounts / app-repo Secrets,
#   then delete the bootstrap IAM user and its credentials.
on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - stg
          - prod
        default: dev
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  contents: read

concurrency:
  group: bootstrap-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: bootstrap-${{ inputs.target_environment }}

    env:
      ENVIRONMENT: ${{ inputs.target_environment }}
      AWS_REGION: ap-northeast-1

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (bootstrap IAM user)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure state bucket exists
        run: |
          BUCKET="cicd-demo-terraform-${ENVIRONMENT}"

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "$BUCKET already exists"
          else
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
            echo "Created $BUCKET"
          fi

          aws s3api put-bucket-versioning \
            --bucket "$BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-public-access-block \
            --bucket "$BUCKET" \
            --public-access-block-configuration \
            BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          aws s3api put-bucket-encryption \
            --bucket "$BUCKET" \
            --server-side-encryption-configuration '{
              "Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]
            }'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.3"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: environments/${{ env.ENVIRONMENT }}
        run: terraform init

      - name: Terraform Plan
        working-directory: environments/${{ env.ENVIRONMENT }}
        run: terraform plan -no-color -out=tfplan

      - name: Show plan in Step Summary
        working-directory: environments/${{ env.ENVIRONMENT }}
        run: |
          echo "### Bootstrap Plan — $ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          terraform show -no-color tfplan >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-bootstrap-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: environments/${{ env.ENVIRONMENT }}/tfplan
          retention-days: 1
          if-no-files-found: error

  apply:
    needs: plan
    if: inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: bootstrap-${{ inputs.target_environment }}

    env:
      ENVIRONMENT: ${{ inputs.target_environment }}
      AWS_REGION: ap-northeast-1

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (bootstrap IAM user)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.3"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: environments/${{ env.ENVIRONMENT }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-bootstrap-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: environments/${{ env.ENVIRONMENT }}

      - name: Verify plan artifact exists
        working-directory: environments/${{ env.ENVIRONMENT }}
        run: test -f tfplan

      - name: Terraform Apply
        working-directory: environments/${{ env.ENVIRONMENT }}
        run: terraform apply -auto-approve tfplan

      - name: Show next steps in Step Summary
        working-directory: environments/${{ env.ENVIRONMENT }}
        run: |
          UPPER_ENV=$(echo "$ENVIRONMENT" | tr '[:lower:]' '[:upper:]')
          PLAN_ARN=$(terraform output -raw terraform_plan_role_arn)
          APPLY_ARN=$(terraform output -raw terraform_apply_role_arn)
          DEPLOY_ARN=$(terraform output -raw app_deploy_role_arn)
          ACCOUNTS_PLAN_ARN=$(terraform output -raw accounts_plan_role_arn)
          ACCOUNTS_APPLY_ARN=$(terraform output -raw accounts_apply_role_arn)

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Bootstrap 完了 — ${ENVIRONMENT}

          ### 1. terraform-repo Repository Secrets

          | Secret 名 | 値 |
          |-----------|---|
          | \`AWS_TERRAFORM_PLAN_ROLE_ARN_${UPPER_ENV}\` | \`${PLAN_ARN}\` |

          ### 2. terraform-repo GitHub Environment \`${ENVIRONMENT}\`

          | Secret 名 | 値 |
          |-----------|---|
          | \`AWS_TERRAFORM_ROLE_ARN\` | \`${APPLY_ARN}\` |

          ### 3. app-repo GitHub Environment \`${ENVIRONMENT}\`

          | Secret 名 | 値 |
          |-----------|---|
          | \`AWS_DEPLOY_ROLE_ARN\` | \`${DEPLOY_ARN}\` |

          ### 4. terraform-accounts Repository Secrets

          | Secret 名 | 値 |
          |-----------|---|
          | \`AWS_ACCOUNTS_PLAN_ROLE_ARN_${UPPER_ENV}\` | \`${ACCOUNTS_PLAN_ARN}\` |

          ### 5. terraform-accounts GitHub Environment \`${ENVIRONMENT}\`

          | Secret 名 | 値 |
          |-----------|---|
          | \`AWS_ACCOUNTS_ROLE_ARN\` | \`${ACCOUNTS_APPLY_ARN}\` |

          ### 6. 後片付け（登録完了後）

          - GitHub Environment \`bootstrap-${ENVIRONMENT}\` から \`AWS_BOOTSTRAP_ACCESS_KEY_ID\` を削除
          - GitHub Environment \`bootstrap-${ENVIRONMENT}\` から \`AWS_BOOTSTRAP_SECRET_ACCESS_KEY\` を削除
          - AWS Console の bootstrap 用 IAM User を削除
          EOF
